name: Build and Deploy

on:
  push:
    tags:
      - 'ZipEditor_*'

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Extract version from tag
        id: version
        run: |
          # ZipEditor_1_2_0 -> 1.2.0, ZipEditor_1_2_0_rc1 -> 1.2.0.rc1
          TAG="${GITHUB_REF#refs/tags/ZipEditor_}"
          VERSION="${TAG//_/.}"
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"

      - name: Install GTK and display dependencies
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y -qq libgtk-3-dev dbus-daemon xvfb

      - name: Start Xvfb
        run: |
          Xvfb :99 -screen 0 1024x768x24 -noreset &
          echo "DISPLAY=:99" >> "$GITHUB_ENV"

      - name: Set up Java 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'

      - name: Set version from tag
        run: |
          VERSION="${{ steps.version.outputs.version }}"
          # Append -SNAPSHOT for 3-segment versions (1.2.0) so Tycho replaces .qualifier with timestamp
          # 4+ segment versions (1.2.0.rc1) are used as-is
          if [[ "$VERSION" =~ ^[0-9]+\.[0-9]+\.[0-9]+$ ]]; then
            VERSION="${VERSION}-SNAPSHOT"
          fi
          mvn org.eclipse.tycho:tycho-versions-plugin:set-version -DnewVersion="${VERSION}" --batch-mode

      - name: Build with Maven Tycho
        run: dbus-run-session -- mvn clean verify --batch-mode

      - name: Prepare upload directory
        env:
          VERSION: ${{ steps.version.outputs.version }}
        run: |
          mkdir -p upload/${VERSION}
          cp -r ZipEditor.UpdateSite/target/repository/* upload/${VERSION}/
          .github/generate-composite.sh upload

      - name: Deploy to SourceForge
        uses: wlixcc/SFTP-Deploy-Action@v1.2.6
        with:
          server: web.sourceforge.net
          username: ${{ secrets.SF_USERNAME }}
          password: ${{ secrets.SF_PASSWORD }}
          local_path: ./upload/.
          remote_path: /home/project-web/zipeditor/htdocs/update/
          sftp_only: true

      - name: Cleanup stale versions
        env:
          SFTP_USERNAME: ${{ secrets.SF_USERNAME }}
          SFTP_PASSWORD: ${{ secrets.SF_PASSWORD }}
        run: |
          sudo apt-get install -y -qq lftp
          .github/cleanup-stale-versions.sh
